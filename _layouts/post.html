---
layout: default
---
<div class="row">
  <div class="side"></div>
  <div class="main">
    <article>
      <header class="post-header">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.tags.size > 0 %} · {{ page.tags | join: ", " }}{% endif %}</p>
      </header>
      <div class="post-content">
        {{ content }}
      </div>
      <p class="post-back"><a href="{{ '/blog/' | relative_url }}">&larr; Back to all posts</a></p>
    </article>
  </div>
</div>
